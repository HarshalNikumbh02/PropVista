{% extends "base.html" %}
{% block title %}Password Reset Complete | PropVista{% endblock %}
{% block content %}
<section class="py-5" style="background: linear-gradient(135deg, rgba(37,99,235,0.02), rgba(124,58,237,0.02)); min-height: 80vh; display: flex; align-items: center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="pv-card p-4 p-lg-5 reveal text-center">
          <div class="text-success mb-3">
            <i class="bi bi-check2-circle" style="font-size: 3.5rem;"></i>
          </div>
          <span class="pv-eyebrow">Success</span>
          <h1 class="pv-serif h2 mt-2">Password Reset</h1>
          <p class="pv-muted mt-3">Your password has been successfully updated! You can now log in using your new credentials.</p>
          
          <a href="{% url 'accounts:login' %}" class="pv-btn pv-btn-primary py-2.5 w-100 mt-4">
            Sign In Now
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
