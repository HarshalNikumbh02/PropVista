{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
  <div class="card p-4 mx-auto" style="max-width:520px;">
    <h4 class="fw-bold">Delete property?</h4>
    <p class="text-muted">This will permanently remove "{{ prop.title }}".</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger">Yes, delete</button>
      <a href="{% url 'properties:my_properties' %}" class="btn btn-light">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
