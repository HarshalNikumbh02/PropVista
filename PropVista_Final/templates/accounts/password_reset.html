{% extends "base.html" %}
{% block title %}Reset Password | PropVista{% endblock %}
{% block content %}
<section class="py-5" style="background: linear-gradient(135deg, rgba(37,99,235,0.02), rgba(124,58,237,0.02)); min-height: 80vh; display: flex; align-items: center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="pv-card p-4 p-lg-5 reveal">
          <div class="text-center mb-4">
            <span class="pv-eyebrow"><i class="bi bi-shield-lock"></i> Account recovery</span>
            <h1 class="pv-serif h2 mt-2">Reset Password</h1>
            <p class="pv-muted small">Enter your registered email address and we'll send you a link to reset your password.</p>
          </div>
          
          <form method="post" class="vstack gap-3">
            {% csrf_token %}
            <div>
              <label class="form-label fw-bold">Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="name@example.com" required id="id_email">
            </div>
            
            <button type="submit" class="pv-btn pv-btn-primary py-2.5 w-100">
              <i class="bi bi-envelope-open"></i> Send Reset Link
            </button>
          </form>
          
          <div class="text-center mt-4 border-top pt-3">
            <p class="mb-0 small text-muted">Remember your password? <a href="{% url 'accounts:login' %}" class="fw-bold text-decoration-none">Sign in</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
