{% extends 'base.html' %}
{% block title %}My Favorites{% endblock %}
{% block content %}
<div class="container py-5">
  <h3 class="fw-bold mb-4">Saved Properties</h3>
  <div class="row g-4">
    {% for f in favorites %}
      {% include 'properties/_card.html' with prop=f.property %}
    {% empty %}
      <div class="col-12 text-center text-muted py-5">
        <i class="bi bi-heart" style="font-size:3rem;"></i>
        <p class="mt-3">No saved properties yet.</p>
        <a href="{% url 'properties:list' %}" class="btn btn-primary">Browse Properties</a>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
