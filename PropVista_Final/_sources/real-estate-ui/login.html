<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - RealEstate Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%); min-height: 100vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg" style="border: none; border-radius: 12px;">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold mb-2" style="color: #0066cc;"><i class="fas fa-home"></i> RealEstate Pro</h2>
                            <p class="text-muted">Sign in to your account</p>
                        </div>

                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-500">Email Address</label>
                                <input type="email" class="form-control" placeholder="you@example.com" style="border: 1px solid #d0d5dd; padding: 10px 12px;">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-500">Password</label>
                                <input type="password" class="form-control" placeholder="Enter your password" style="border: 1px solid #d0d5dd; padding: 10px 12px;">
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3" style="background-color: #0066cc; border: none;">Sign In</button>
                        </form>

                        <div class="text-center mb-3">
                            <a href="#" class="text-decoration-none" style="color: #0066cc; font-size: 0.9rem;">Forgot your password?</a>
                        </div>

                        <hr>

                        <p class="text-center text-muted small mb-3">Or continue with</p>

                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-secondary" style="border: 1px solid #d0d5dd;">
                                <i class="fab fa-google"></i> Google
                            </button>
                        </div>

                        <p class="text-center mt-4 small text-muted">
                            Don&apos;t have an account? <a href="register.html" class="text-decoration-none fw-bold" style="color: #0066cc;">Sign up</a>
                        </p>
                    </div>
                </div>

                <p class="text-center text-white mt-4 small">
                    <a href="index.html" class="text-white text-decoration-none">← Back to Home</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
